<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            width: 1000px;
            margin: 5px auto;
        }
        #header{
            width: 100%;
            height: 150px;
            background-color: antiquewhite;
        }
        #sidebar2{
            width: 200px;
            height: 600px;
            background-color: plum;
            padding: 10px;
            float: left;
            box-sizing: border-box;
        }
        #contents{
            width: 500px;
            height: 600px;
            background-color: aqua;
            float: left;
            border: 2px solid black;
            padding: 10px;
            box-sizing: border-box; /* padding 이나 border 를 합쳐서 크기를 맞춰준다. */
        }
        #sidebar{
            width: 300px;
            height: 600px;
            background-color: chartreuse;
            float: right;
            padding: 10px;
            box-sizing: border-box;
        }
        #footer{
            width: 100%;
            height: 150px;
            background-color: #eee;
            clear: both;
        }

    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            검색기능, 메뉴
        </div>
        <div id="sidebar2">메뉴 넣을까</div>
        <div id="contents">
            주요 기능 넣기
        </div>
        <div id="sidebar">로그인, 광고 등등</div>
        <div id="footer">사이트정보,이것저것 사업주 등등</div>
    </div>
</body>
</html>

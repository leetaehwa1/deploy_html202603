<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .list1{
            list-style-type:upper-latin;
        }
        .list2{
            list-style-image: url(../media/dot.png);
        }
        .list3 li{ /* ,를 붙이면 모든 요소를, 안붙이면 list3 밑에 있는 li만 디스플레이 적용 */
            display: inline-block;
        }

    </style>
</head>
<body>
    <ul class="list1">
        <li>자바</li>
        <li>오라클</li>
        <li>html</li>
    </ul>
    <hr>
    <ul class="list2">
        <li>자바</li>
        <li>오라클</li>
        <li>html</li>
    </ul>
    <hr>
    <ul class="list3">
        <li>자바</li>
        <li>오라클</li>
        <li>html</li>
    </ul>
</body>
</html>
